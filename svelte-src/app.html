<!doctype html>
<html lang="en" style="height: 100%">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="A full-featured Discord-like chat platform for communities" />
    <meta name="theme-color" content="#5865F2" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BandChat" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="apple-touch-startup-image" href="/icons/icon-192.png" />
    <meta name="apple-mobile-web-app-orientations" content="portrait" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <title>Band Chat - Discord Clone</title>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" style="height: 100%; margin: 0; padding: 0; overflow: hidden">
    <div style="display: contents; height: 100%" id="svelte">%sveltekit.body%</div>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      }
    </script>
  </body>
</html>
